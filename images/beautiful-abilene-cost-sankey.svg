<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Monthly cost apportionment for a beautiful Abilene AI datacenter</title>
  <desc id="desc">A Sankey diagram showing a 428.2 million dollar monthly cost flowing mostly to servers, facilities, power, networking, and people, with a 1.48 million dollar beautification branch expanded into stone cladding, landscape maintenance, landscape construction, and small ornaments.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #2c261d;
      }

      .title {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 28px;
        font-weight: 700;
      }

      .subtitle,
      .note {
        fill: #6b6258;
        font-size: 14px;
      }

      .label {
        font-size: 15px;
        font-weight: 700;
      }

      .value {
        fill: #6b6258;
        font-size: 13px;
      }

      .node {
        fill: #fbf7ee;
        stroke: #b9aa91;
        stroke-width: 1.2;
      }

      .node-dark {
        fill: #2f2a22;
        stroke: #2f2a22;
      }

      .node-dark-text {
        fill: #fff8ec;
      }

      .flow {
        fill: none;
        stroke-linecap: round;
        opacity: 0.82;
      }

      .connector {
        fill: none;
        stroke: #b9aa91;
        stroke-dasharray: 4 6;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <rect width="960" height="640" fill="#f4f0e5" />

  <text class="title" x="44" y="48">Beautiful Abilene monthly cost apportionment</text>
  <text class="subtitle" x="44" y="74">Midpoint beautification estimate: $428.2M/month total, or $1.832 per GPU-hour.</text>

  <path class="flow" d="M 222 253 C 330 253, 390 146, 498 146" stroke="#9f6f45" stroke-width="121.4" />
  <path class="flow" d="M 222 253 C 330 253, 390 250, 498 250" stroke="#bf8b5d" stroke-width="22.7" />
  <path class="flow" d="M 222 253 C 330 253, 390 315, 498 315" stroke="#d0a064" stroke-width="18.9" />
  <path class="flow" d="M 222 253 C 330 253, 390 374, 498 374" stroke="#8fa88a" stroke-width="18.9" />
  <path class="flow" d="M 222 253 C 330 253, 390 424, 498 424" stroke="#7c96aa" stroke-width="13.8" />
  <path class="flow" d="M 222 253 C 330 253, 390 462, 498 462" stroke="#b8afa2" stroke-width="3.2" />
  <path class="flow" d="M 222 253 C 330 253, 390 496, 498 496" stroke="#c74f3f" stroke-width="1.2" />

  <rect class="node node-dark" x="44" y="183" width="178" height="140" rx="12" />
  <text class="label node-dark-text" x="68" y="232">Beautiful Abilene</text>
  <text class="value node-dark-text" x="68" y="258">$428.2M / month</text>
  <text class="value node-dark-text" x="68" y="282">$1.832 / GPU-hour</text>

  <rect class="node" x="498" y="86" width="260" height="82" rx="10" />
  <text class="label" x="520" y="122">Servers</text>
  <text class="value" x="520" y="146">$288.7M / month</text>
  <text class="value" x="650" y="146">67.4% of total</text>

  <rect class="node" x="498" y="222" width="260" height="62" rx="10" />
  <text class="label" x="520" y="248">Facilities</text>
  <text class="value" x="520" y="271">$54.0M / month, 12.6%</text>

  <rect class="node" x="498" y="294" width="260" height="62" rx="10" />
  <text class="label" x="520" y="320">Power</text>
  <text class="value" x="520" y="343">$45.0M / month, 10.5%</text>

  <rect class="node" x="498" y="366" width="260" height="62" rx="10" />
  <text class="label" x="520" y="392">Networking</text>
  <text class="value" x="520" y="415">$32.8M / month, 7.7%</text>

  <rect class="node" x="498" y="438" width="260" height="48" rx="10" />
  <text class="label" x="520" y="466">People</text>
  <text class="value" x="610" y="466">$6.3M / month, 1.5%</text>

  <rect class="node" x="498" y="496" width="260" height="54" rx="10" />
  <text class="label" x="520" y="525">Beautification</text>
  <text class="value" x="642" y="525">$1.48M / month, 0.35%</text>

  <path class="connector" d="M 758 523 C 798 523, 792 402, 832 402" stroke-width="1.6" />
  <rect class="node" x="802" y="336" width="116" height="132" rx="10" />
  <text class="label" x="823" y="369">Beauty</text>
  <text class="value" x="823" y="392">expanded</text>
  <text class="value" x="823" y="415">not to main</text>
  <text class="value" x="823" y="438">flow scale</text>

  <path class="flow" d="M 102 576 C 190 576, 250 524, 338 524" stroke="#c74f3f" stroke-width="61.0" />
  <path class="flow" d="M 102 576 C 190 576, 250 576, 338 576" stroke="#879f72" stroke-width="10.1" />
  <path class="flow" d="M 102 576 C 190 576, 250 606, 338 606" stroke="#a9b57e" stroke-width="3.8" />

  <text class="label" x="44" y="514">Beautification detail</text>
  <text class="subtitle" x="44" y="536">$1.48M/month at the midpoint, scaled separately</text>
  <rect class="node" x="44" y="554" width="58" height="44" rx="8" />
  <text class="value" x="58" y="581">100%</text>

  <rect class="node" x="338" y="488" width="242" height="56" rx="10" />
  <text class="label" x="358" y="514">Stone cladding</text>
  <text class="value" x="358" y="535">$1.21M / month, 81.4%</text>

  <rect class="node" x="338" y="555" width="242" height="42" rx="10" />
  <text class="label" x="358" y="581">Landscape maintenance</text>
  <text class="value" x="518" y="581">$0.20M, 13.5%</text>

  <rect class="node" x="338" y="604" width="300" height="34" rx="10" />
  <text class="label" x="358" y="626">Landscape construction and ornaments</text>
  <text class="value" x="585" y="626">$0.08M, 5.1%</text>

  <text class="note" x="44" y="116">Main flows are proportional to monthly cost. The red beautification branch is visible here only because it is drawn at a one-pixel minimum.</text>
  <text class="note" x="44" y="132">The expanded detail shows how the beautification branch itself is apportioned.</text>
</svg>
