<svg xmlns="http://www.w3.org/2000/svg" width="1270" height="680" viewBox="0 0 1270 680" role="img" aria-labelledby="title desc">
  <title id="title">Monthly cost apportionment for a beautiful Abilene AI datacenter</title>
  <desc id="desc">A Sankey diagram showing the monthly cost of a beautiful Abilene AI datacenter apportioned to servers, facilities, power, networking, people, and beautification.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #2c261d;
      }

      .label {
        font-size: 18px;
        font-weight: 700;
      }

      .value {
        fill: #6b6258;
        font-size: 15px;
      }

      .node {
        fill: #fbf7ee;
        stroke: #b9aa91;
        stroke-width: 1.2;
      }

      .source {
        fill: #2f2a22;
        stroke: #2f2a22;
      }

      .source-text {
        fill: #fff8ec;
      }

      .flow {
        fill: none;
        stroke-linecap: butt;
        opacity: 0.78;
      }

      .hairline {
        fill: none;
        stroke-linecap: round;
        opacity: 0.95;
      }
    </style>
  </defs>

  <rect width="1270" height="680" fill="#f8f6ef" />

  <path class="flow" d="M 260 201.35 C 471 201.35, 719 182.5, 930 182.5" stroke="#9f6f45" stroke-width="242.7" />
  <path class="flow" d="M 260 345.35 C 471 345.35, 719 349, 930 349" stroke="#bf8b5d" stroke-width="45.3" />
  <path class="flow" d="M 260 386.9 C 471 386.9, 719 423, 930 423" stroke="#d0a064" stroke-width="37.8" />
  <path class="flow" d="M 260 419.6 C 471 419.6, 719 497, 930 497" stroke="#8fa88a" stroke-width="27.6" />
  <path class="flow" d="M 260 436.05 C 471 436.05, 719 565, 930 565" stroke="#b8afa2" stroke-width="5.3" />
  <path class="flow" d="M 260 439.35 C 471 439.35, 719 630, 930 630" stroke="#c74f3f" stroke-width="1.3" />

  <rect class="source" x="42" y="80" width="218" height="360" />
  <text class="label source-text" x="72" y="245">Beautiful Abilene</text>
  <text class="value source-text" x="72" y="275">$428.2M / month</text>
  <text class="value source-text" x="72" y="302">$1.832 / GPU-hour</text>

  <rect class="node" x="930" y="60" width="300" height="245" rx="12" />
  <text class="label" x="960" y="168">Servers</text>
  <text class="value" x="960" y="197">$288.7M / month</text>
  <text class="value" x="960" y="224">67.4% of total</text>

  <rect class="node" x="930" y="318" width="300" height="62" rx="12" />
  <text class="label" x="960" y="344">Facilities</text>
  <text class="value" x="960" y="368">$54.0M / month, 12.6%</text>

  <rect class="node" x="930" y="392" width="300" height="62" rx="12" />
  <text class="label" x="960" y="418">Power</text>
  <text class="value" x="960" y="442">$45.0M / month, 10.5%</text>

  <rect class="node" x="930" y="466" width="300" height="62" rx="12" />
  <text class="label" x="960" y="492">Networking</text>
  <text class="value" x="960" y="516">$32.8M / month, 7.7%</text>

  <rect class="node" x="930" y="540" width="300" height="50" rx="12" />
  <text class="label" x="960" y="563">People</text>
  <text class="value" x="960" y="582">$6.3M / month, 1.5%</text>

  <rect class="node" x="930" y="608" width="300" height="44" rx="12" />
  <text class="label" x="960" y="635">Beauty</text>
  <text class="value" x="1040" y="635">$1.48M / month, 0.35%</text>
</svg>
